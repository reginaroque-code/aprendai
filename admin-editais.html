<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>AprendAI — Administração de Editais</title>
<style>
  :root{
    --navy:#0D2550;
    --navy-light:#16386f;
    --gold:#F0A500;
    --bg:#f4f6fb;
    --card:#ffffff;
    --line:#e2e6ef;
    --text:#1c2740;
    --muted:#68728a;
    --danger:#c0392b;
    --danger-bg:#fdecea;
    --ok:#1e8e5a;
    --ok-bg:#e8f7f0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
  }

  /* ---------- Tela de login ---------- */
  #login-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .login-box{
    background:var(--card);
    border-radius:16px;
    padding:40px 32px;
    width:100%;
    max-width:360px;
    box-shadow:0 10px 40px rgba(13,37,80,0.12);
    text-align:center;
  }
  .login-box .logo{
    font-weight:800;
    font-size:1.4rem;
    color:var(--navy);
    margin-bottom:4px;
  }
  .login-box .sub{
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:24px;
  }
  .login-box input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1.5px solid var(--line);
    font-size:.95rem;
    margin-bottom:12px;
  }
  .login-box input:focus{outline:none;border-color:var(--gold);}
  .btn{
    display:inline-block;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:.92rem;
    font-weight:700;
    cursor:pointer;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--navy);color:#fff;width:100%;}
  .btn-primary:hover{background:var(--navy-light);}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:hover{opacity:.9;}
  .btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line);}
  .btn-ghost:hover{border-color:var(--muted);}
  .btn-danger{background:var(--danger-bg);color:var(--danger);}
  .btn-danger:hover{background:#fbdbd7;}
  .btn-sm{padding:7px 12px;font-size:.78rem;}
  .login-err{
    color:var(--danger);
    font-size:.82rem;
    margin-bottom:10px;
    min-height:1em;
  }

  /* ---------- App principal ---------- */
  #app{display:none;}
  header.top{
    background:var(--navy);
    color:#fff;
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  header.top h1{
    font-size:1.15rem;
    margin:0;
    font-weight:800;
  }
  header.top h1 span{color:var(--gold);}
  header.top .actions{display:flex;gap:10px;align-items:center;}

  main{
    max-width:920px;
    margin:0 auto;
    padding:28px 20px 80px;
  }

  .toolbar{
    display:flex;
    gap:10px;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .toolbar input[type="text"]{
    flex:1;
    min-width:200px;
    padding:10px 14px;
    border-radius:10px;
    border:1.5px solid var(--line);
    font-size:.9rem;
  }

  .msg{
    padding:10px 14px;
    border-radius:10px;
    font-size:.85rem;
    margin-bottom:16px;
    display:none;
  }
  .msg.show{display:block;}
  .msg.ok{background:var(--ok-bg);color:var(--ok);}
  .msg.err{background:var(--danger-bg);color:var(--danger);}

  .disc-card{
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:14px;
    margin-bottom:12px;
    overflow:hidden;
  }
  .disc-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    cursor:pointer;
    gap:10px;
  }
  .disc-head:hover{background:#fafbfd;}
  .disc-title{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    font-weight:700;
    font-size:.95rem;
  }
  .disc-title .cargo{font-weight:500;color:var(--muted);font-size:.85rem;}
  .badge{
    font-size:.68rem;
    font-weight:700;
    padding:3px 9px;
    border-radius:50px;
  }
  .badge.on{background:var(--ok-bg);color:var(--ok);}
  .badge.off{background:#f0f1f5;color:var(--muted);}
  .badge.area{background:#eef2fb;color:var(--navy);}
  .count{color:var(--muted);font-size:.8rem;font-weight:500;}
  .chev{color:var(--muted);transition:transform .15s ease;}
  .disc-card.open .chev{transform:rotate(180deg);}

  .disc-body{
    display:none;
    padding:0 18px 18px;
    border-top:1px solid var(--line);
  }
  .disc-card.open .disc-body{display:block;}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0;}
  .pill{
    background:#f0f2f8;
    color:var(--navy);
    font-size:.78rem;
    padding:5px 11px;
    border-radius:50px;
  }
  .pill.comum{background:#eaf3ff;color:#1a4d8f;}
  .pill.espec{background:#fff6e6;color:#8a6100;}
  .disc-actions{display:flex;gap:8px;margin-top:10px;}
  .disc-actions .btn{padding:8px 14px;font-size:.82rem;}

  /* ---------- Formulário ---------- */
  #form-card{
    background:var(--card);
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:22px;
    margin-bottom:24px;
    display:none;
  }
  #form-card.show{display:block;}
  #form-card h2{font-size:1.02rem;margin:0 0 16px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:.82rem;
    font-weight:700;
    color:var(--navy);
    margin-bottom:5px;
  }
  .field .hint{
    font-weight:400;
    color:var(--muted);
    font-size:.78rem;
  }
  .field input[type="text"], .field input[type="number"], .field textarea, .field select{
    width:100%;
    padding:10px 12px;
    border-radius:9px;
    border:1.5px solid var(--line);
    font-size:.88rem;
    font-family:inherit;
    resize:vertical;
    background:#fff;
  }
  .field textarea{min-height:90px;line-height:1.5;}
  .field input:focus, .field textarea:focus, .field select:focus{outline:none;border-color:var(--gold);}
  .row2{display:flex;gap:14px;flex-wrap:wrap;}
  .row2 > div{flex:1;min-width:140px;}
  .check{display:flex;align-items:center;gap:8px;font-size:.85rem;}
  .form-actions{display:flex;gap:10px;margin-top:18px;}

  .comuns-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:8px;
    background:#fafbfd;
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:12px;
  }
  .comuns-grid label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:.85rem;
    font-weight:500;
    color:var(--text);
    cursor:pointer;
  }

  .espec-item{
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:14px;
    margin-bottom:10px;
    background:#fafbfd;
  }
  .espec-item .field{margin-bottom:10px;}
  .espec-item .remove-btn{
    background:none;border:none;color:var(--danger);
    font-size:.78rem;font-weight:700;cursor:pointer;padding:0;
  }

  .empty{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-size:.9rem;
  }
  .loading{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-size:.9rem;
  }

  @media(max-width:600px){
    header.top{padding:14px 16px;}
    main{padding:20px 14px 60px;}
  }
</style>
</head>
<body>

<!-- ═══════════ TELA DE LOGIN ═══════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">Aprend<span style="color:#F0A500">AI</span></div>
    <div class="sub">Administração de editais</div>
    <div class="login-err" id="login-err"></div>
    <input type="password" id="senha-input" placeholder="Senha de administradora" autocomplete="off">
    <button class="btn btn-primary" onclick="login()">Entrar</button>
  </div>
</div>

<!-- ═══════════ APP PRINCIPAL ═══════════ -->
<div id="app">
  <header class="top">
    <h1>Aprend<span>AI</span> · Editais</h1>
    <div class="actions">
      <button class="btn btn-gold" onclick="abrirFormNovo()">+ Novo edital</button>
      <button class="btn btn-ghost" onclick="sair()">Sair</button>
    </div>
  </header>

  <main>
    <div class="msg" id="msg"></div>

    <!-- Formulário de criar/editar -->
    <div id="form-card">
      <h2 id="form-title">Novo edital</h2>
      <input type="hidden" id="f-id-original">

      <div class="row2">
        <div class="field">
          <label>Identificador (id) <span class="hint">— sem espaços/acentos, ex: tj-am-2024-analista</span></label>
          <input type="text" id="f-id" placeholder="Ex: tj-am-2024-analista">
        </div>
        <div class="field">
          <label>Área <span class="hint">— usada nos filtros da tela</span></label>
          <select id="f-area">
            <option value="fiscal">Fiscal</option>
            <option value="controle">Controle</option>
            <option value="judiciario">Judiciário</option>
            <option value="tribunal_contas">Tribunal de Contas</option>
            <option value="policial">Policial</option>
            <option value="bancario">Bancário</option>
            <option value="administrativo">Administrativo</option>
            <option value="educacao">Educação</option>
            <option value="legislativo">Legislativo</option>
          </select>
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Órgão</label>
          <input type="text" id="f-orgao" placeholder="Ex: TJ-AM">
        </div>
        <div class="field">
          <label>Cargo</label>
          <input type="text" id="f-cargo" placeholder="Ex: Analista Judiciário">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Banca</label>
          <input type="text" id="f-banca" placeholder="Ex: FGV">
        </div>
        <div class="field">
          <label>Ano</label>
          <input type="number" id="f-ano" placeholder="Ex: 2024">
        </div>
      </div>

      <div class="field">
        <label>Disciplinas comuns <span class="hint">— reaproveitadas do banco (marque as que este edital cobra)</span></label>
        <div class="comuns-grid" id="comuns-grid"></div>
      </div>

      <div class="field">
        <label>Disciplinas específicas <span class="hint">— exclusivas deste edital/cargo</span></label>
        <div id="espec-list"></div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="adicionarEspecifica()">+ Adicionar disciplina específica</button>
      </div>

      <div class="row2">
        <div class="field">
          <label>Ordem <span class="hint">— menor número aparece primeiro</span></label>
          <input type="number" id="f-ordem" value="0">
        </div>
        <div class="field" style="display:flex;align-items:flex-end;">
          <label class="check" style="margin-bottom:10px;">
            <input type="checkbox" id="f-ativo" checked>
            Visível no site
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="salvar()">Salvar edital</button>
        <button class="btn btn-ghost" onclick="fecharForm()">Cancelar</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" id="busca" placeholder="Buscar órgão, cargo, banca ou área..." oninput="renderLista()">
    </div>

    <div id="lista"></div>
  </main>
</div>

<script>
let SENHA = '';
let EDITAIS = [];

// Precisa bater com o banco de disciplinas comuns que existe no index.html (DISCIPLINAS_COMUNS)
const COMUNS_DISPONIVEIS = [
  {id:'portugues', nome:'Língua Portuguesa'},
  {id:'rlm', nome:'Raciocínio Lógico-Matemático'},
  {id:'dir-constitucional', nome:'Direito Constitucional'},
  {id:'dir-administrativo', nome:'Direito Administrativo'},
  {id:'etica-servico-publico', nome:'Ética no Serviço Público'},
  {id:'informatica', nome:'Noções de Informática'},
];

const AREA_LABEL = {
  fiscal:'Fiscal', controle:'Controle', judiciario:'Judiciário',
  tribunal_contas:'Tribunal de Contas', policial:'Policial',
  bancario:'Bancário', administrativo:'Administrativo',
  educacao:'Educação', legislativo:'Legislativo',
};

let especFields = []; // [{nome:'', modulosText:''}]

function login(){
  const input = document.getElementById('senha-input');
  const err = document.getElementById('login-err');
  const senha = input.value.trim();
  if(!senha){ err.textContent = 'Digite a senha.'; return; }
  err.textContent = '';
  SENHA = senha;
  carregarLista(true);
}

document.getElementById('senha-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter') login();
});

function sair(){
  SENHA = '';
  EDITAIS = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('senha-input').value = '';
}

function mostrarMsg(texto, tipo){
  const el = document.getElementById('msg');
  el.textContent = texto;
  el.className = 'msg show ' + tipo;
  setTimeout(()=>{ el.className = 'msg'; }, 4000);
}

async function chamarAPI(method, body){
  const opts = {
    method: method,
    headers: {
      'Content-Type': 'application/json',
      'x-admin-password': SENHA
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch('/api/admin-editais', opts);
  const data = await r.json().catch(()=>({}));
  if(r.status === 401){
    throw new Error('SENHA_INVALIDA');
  }
  if(!r.ok){
    throw new Error(data.error || 'Erro na operação');
  }
  return data;
}

async function carregarLista(primeiraVez){
  const lista = document.getElementById('lista');
  if(primeiraVez) lista.innerHTML = '<div class="loading">Carregando editais...</div>';
  try{
    const data = await chamarAPI('GET');
    EDITAIS = data;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderLista();
  }catch(e){
    if(e.message === 'SENHA_INVALIDA'){
      document.getElementById('login-err').textContent = 'Senha incorreta.';
    }else{
      lista.innerHTML = '<div class="empty">Não foi possível carregar os editais. Tente novamente.</div>';
      mostrarMsg('Erro ao carregar: ' + e.message, 'err');
    }
  }
}

function nomesComuns(ids){
  return (ids||[]).map(id => {
    const c = COMUNS_DISPONIVEIS.find(x => x.id === id);
    return c ? c.nome : id;
  });
}

function renderLista(){
  const termo = document.getElementById('busca').value.trim().toLowerCase();
  const lista = document.getElementById('lista');
  const filtrados = EDITAIS.filter(e =>
    (e.orgao||'').toLowerCase().includes(termo) ||
    (e.cargo||'').toLowerCase().includes(termo) ||
    (e.banca||'').toLowerCase().includes(termo) ||
    (AREA_LABEL[e.area]||e.area||'').toLowerCase().includes(termo)
  );

  if(filtrados.length === 0){
    lista.innerHTML = '<div class="empty">Nenhum edital encontrado.</div>';
    return;
  }

  lista.innerHTML = filtrados.map(e => {
    const comuns = e.comuns || [];
    const especificas = e.disciplinas || [];
    const totalDisc = comuns.length + especificas.length;
    return `
      <div class="disc-card" id="card-${e.id}">
        <div class="disc-head" onclick="toggleCard('${e.id}')">
          <div class="disc-title">
            ${escapeHtml(e.orgao)} · ${e.ano}
            <span class="cargo">${escapeHtml(e.cargo)}</span>
            <span class="badge area">${AREA_LABEL[e.area] || e.area}</span>
            <span class="badge ${e.ativo ? 'on':'off'}">${e.ativo ? 'Visível' : 'Oculto'}</span>
            <span class="count">${totalDisc} disciplinas</span>
          </div>
          <span class="chev">▾</span>
        </div>
        <div class="disc-body">
          <div style="font-size:.82rem;color:var(--muted);margin-top:12px;">Banca: <strong style="color:var(--text)">${escapeHtml(e.banca)}</strong></div>
          <div class="pills">
            ${nomesComuns(comuns).map(n => `<span class="pill comum">${escapeHtml(n)}</span>`).join('')}
            ${especificas.map(d => `<span class="pill espec">${escapeHtml(d.nome)}</span>`).join('')}
          </div>
          <div class="disc-actions">
            <button class="btn btn-ghost" onclick="abrirFormEdicao('${e.id}')">Editar</button>
            <button class="btn btn-danger" onclick="confirmarExclusao('${e.id}','${escapeHtml(e.orgao)} — ${escapeHtml(e.cargo)}')">Apagar</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function toggleCard(id){
  document.getElementById('card-'+id).classList.toggle('open');
}

function renderComunsGrid(marcados){
  const grid = document.getElementById('comuns-grid');
  grid.innerHTML = COMUNS_DISPONIVEIS.map(c => `
    <label>
      <input type="checkbox" value="${c.id}" ${marcados.includes(c.id) ? 'checked' : ''}>
      ${escapeHtml(c.nome)}
    </label>
  `).join('');
}

function comunsMarcados(){
  return Array.from(document.querySelectorAll('#comuns-grid input[type="checkbox"]:checked')).map(el => el.value);
}

function renderEspecList(){
  const wrap = document.getElementById('espec-list');
  if(especFields.length === 0){
    wrap.innerHTML = '<div style="color:var(--muted);font-size:.82rem;padding:6px 0;">Nenhuma disciplina específica adicionada ainda.</div>';
    return;
  }
  wrap.innerHTML = especFields.map((f, i) => `
    <div class="espec-item">
      <div class="field">
        <label>Nome da disciplina <button type="button" class="remove-btn" style="float:right;" onclick="removerEspecifica(${i})">Remover</button></label>
        <input type="text" data-idx="${i}" class="espec-nome" placeholder="Ex: Conhecimentos Específicos — Direito Penal" value="${escapeHtml(f.nome)}" oninput="especFields[${i}].nome=this.value">
      </div>
      <div class="field">
        <label>Assuntos <span class="hint">— um por linha</span></label>
        <textarea data-idx="${i}" class="espec-modulos" oninput="especFields[${i}].modulosText=this.value">${escapeHtml(f.modulosText)}</textarea>
      </div>
    </div>
  `).join('');
}

function adicionarEspecifica(){
  especFields.push({nome:'', modulosText:''});
  renderEspecList();
}

function removerEspecifica(i){
  especFields.splice(i,1);
  renderEspecList();
}

function abrirFormNovo(){
  document.getElementById('form-title').textContent = 'Novo edital';
  document.getElementById('f-id-original').value = '';
  document.getElementById('f-id').value = '';
  document.getElementById('f-id').disabled = false;
  document.getElementById('f-orgao').value = '';
  document.getElementById('f-cargo').value = '';
  document.getElementById('f-banca').value = '';
  document.getElementById('f-ano').value = new Date().getFullYear();
  document.getElementById('f-area').value = 'administrativo';
  document.getElementById('f-ordem').value = (EDITAIS.length + 1) * 10;
  document.getElementById('f-ativo').checked = true;
  renderComunsGrid([]);
  especFields = [];
  renderEspecList();
  document.getElementById('form-card').classList.add('show');
  document.getElementById('f-id').focus();
  window.scrollTo({top:0, behavior:'smooth'});
}

function abrirFormEdicao(id){
  const e = EDITAIS.find(x => x.id === id);
  if(!e) return;
  document.getElementById('form-title').textContent = 'Editar edital';
  document.getElementById('f-id-original').value = e.id;
  document.getElementById('f-id').value = e.id;
  document.getElementById('f-id').disabled = true; // não deixa trocar o id de um edital existente
  document.getElementById('f-orgao').value = e.orgao || '';
  document.getElementById('f-cargo').value = e.cargo || '';
  document.getElementById('f-banca').value = e.banca || '';
  document.getElementById('f-ano').value = e.ano || '';
  document.getElementById('f-area').value = e.area || 'administrativo';
  document.getElementById('f-ordem').value = e.ordem || 0;
  document.getElementById('f-ativo').checked = e.ativo !== false;
  renderComunsGrid(e.comuns || []);
  especFields = (e.disciplinas || []).map(d => ({nome: d.nome || '', modulosText: (d.modulos||[]).join('\n')}));
  renderEspecList();
  document.getElementById('form-card').classList.add('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function fecharForm(){
  document.getElementById('form-card').classList.remove('show');
}

async function salvar(){
  const idOriginal = document.getElementById('f-id-original').value;
  const id = document.getElementById('f-id').value.trim();
  const orgao = document.getElementById('f-orgao').value.trim();
  const cargo = document.getElementById('f-cargo').value.trim();
  const banca = document.getElementById('f-banca').value.trim();
  const ano = parseInt(document.getElementById('f-ano').value) || null;
  const area = document.getElementById('f-area').value;
  const ordem = parseInt(document.getElementById('f-ordem').value) || 0;
  const ativo = document.getElementById('f-ativo').checked;
  const comuns = comunsMarcados();

  const disciplinas = especFields
    .map(f => ({
      nome: (f.nome||'').trim(),
      modulos: (f.modulosText||'').split('\n').map(s=>s.trim()).filter(Boolean)
    }))
    .filter(d => d.nome && d.modulos.length > 0);

  if(!id){ mostrarMsg('Digite o identificador do edital.', 'err'); return; }
  if(!/^[a-z0-9\-]+$/.test(id)){ mostrarMsg('O identificador só pode ter letras minúsculas, números e hífen (sem espaços/acentos).', 'err'); return; }
  if(!orgao){ mostrarMsg('Digite o órgão.', 'err'); return; }
  if(!cargo){ mostrarMsg('Digite o cargo.', 'err'); return; }
  if(!banca){ mostrarMsg('Digite a banca.', 'err'); return; }
  if(!ano){ mostrarMsg('Digite o ano.', 'err'); return; }
  if(comuns.length === 0 && disciplinas.length === 0){
    mostrarMsg('Marque ao menos uma disciplina comum ou adicione uma específica.', 'err');
    return;
  }

  try{
    await chamarAPI('POST', { id, orgao, cargo, banca, ano, area, comuns, disciplinas, ordem, ativo });
    mostrarMsg('Edital salvo com sucesso!', 'ok');
    fecharForm();
    await carregarLista(false);
  }catch(e){
    mostrarMsg('Erro ao salvar: ' + e.message, 'err');
  }
}

function confirmarExclusao(id, label){
  if(confirm(`Apagar o edital "${label}"? Essa ação não pode ser desfeita.`)){
    apagar(id);
  }
}

async function apagar(id){
  try{
    await chamarAPI('DELETE', { id });
    mostrarMsg('Edital apagado.', 'ok');
    await carregarLista(false);
  }catch(e){
    mostrarMsg('Erro ao apagar: ' + e.message, 'err');
  }
}
</script>
